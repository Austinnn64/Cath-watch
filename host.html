<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cath Watch — Host</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
</head>
<body class="room-page host-page">

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="noise-overlay"></div>

  <!-- TOP BAR -->
  <header class="topbar glass">
    <a href="index.html" class="topbar-brand">
      <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
        <circle cx="12" cy="12" r="10" stroke="url(#tg)" stroke-width="1.5"/>
        <path d="M10 8l6 4-6 4V8z" fill="url(#tg2)"/>
        <defs>
          <linearGradient id="tg" x1="2" y1="2" x2="22" y2="22"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient>
          <linearGradient id="tg2" x1="10" y1="8" x2="16" y2="16"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient>
        </defs>
      </svg>
      Cath Watch
    </a>

    <div class="topbar-session">
      <span class="session-label">Session Code</span>
      <div class="session-code-box" id="sessionCodeDisplay">
        <span id="sessionCodeText">——</span>
        <button class="copy-btn" id="copyCodeBtn" title="Copy code">
          <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
            <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </button>
      </div>
      <div class="watcher-count" id="watcherCount">
        <span class="dot"></span>
        <span id="watcherNum">0</span> watching
      </div>
    </div>

    <div class="topbar-role role-host">HOST</div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="room-layout">

    <!-- LEFT: VIDEO + LIBRARY -->
    <div class="room-left">

      <!-- VIDEO PLAYER -->
      <div class="player-wrap glass">
        <div class="player-inner" id="playerInner">
          <div class="player-empty" id="playerEmpty">
            <div class="player-empty-icon">🎬</div>
            <p>Select a movie from the library below</p>
          </div>
          <video id="videoPlayer" style="display:none" preload="metadata"></video>
        </div>

        <!-- CUSTOM CONTROLS (Host only) -->
        <div class="player-controls" id="playerControls">
          <div class="progress-bar-wrap" id="progressWrap">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="progressFill"></div>
              <div class="progress-knob" id="progressKnob"></div>
            </div>
          </div>
          <div class="controls-row">
            <div class="controls-left">
              <button class="ctrl-btn" id="btnPlayPause" title="Play/Pause">
                <svg class="icon-play" viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M8 5l12 7-12 7V5z" fill="currentColor"/></svg>
                <svg class="icon-pause" viewBox="0 0 24 24" fill="none" width="20" height="20" style="display:none"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>
              </button>
              <button class="ctrl-btn" id="btnSkipBack" title="Back 10s">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M12 5V2L7 7l5 5V9c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="currentColor"/><text x="9.5" y="15.5" font-size="5" fill="currentColor" font-family="sans-serif">10</text></svg>
              </button>
              <button class="ctrl-btn" id="btnSkipFwd" title="Forward 10s">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M12 5V2l5 5-5 5V9c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z" fill="currentColor"/><text x="9.5" y="15.5" font-size="5" fill="currentColor" font-family="sans-serif">10</text></svg>
              </button>
              <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
            </div>
            <div class="controls-right">
              <div class="volume-wrap">
                <button class="ctrl-btn" id="btnMute" title="Mute">
                  <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor"/><path class="vol-lines" d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.02" value="1">
              </div>
              <button class="ctrl-btn" id="btnFullscreen" title="Fullscreen">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M8 3H5a2 2 0 00-2 2v3M21 8V5a2 2 0 00-2-2h-3M16 21h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- MOVIE LIBRARY -->
      <div class="library-section glass">
        <div class="library-header">
          <h3>Movie Library</h3>
          <label class="add-movie-btn">
            <svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Add Movies
            <input type="file" id="fileInput" accept=".mp4,.webm,.mkv,.avi,.mov" multiple style="display:none">
          </label>
        </div>
        <div class="library-grid" id="libraryGrid">
          <div class="library-empty" id="libraryEmpty">
            <span>📁</span>
            <p>No movies yet. Click <strong>Add Movies</strong> to load .mp4 files.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: CHAT -->
    <div class="room-right">
      <div class="chat-panel glass">
        <div class="chat-header">
          <h3>Live Chat</h3>
          <span class="chat-badge" id="chatBadge">0</span>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="chat-welcome">
            <span>👋</span> Share your session code with friends to watch together!
          </div>
        </div>
        <div class="chat-input-row">
          <input type="text" class="chat-input" id="chatInput" placeholder="Say something…" maxlength="200" autocomplete="off">
          <button class="chat-send-btn" id="chatSendBtn">
            <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M18 2L2 9l7 2 2 7 7-16z" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    window.CATH_ROLE = 'host';
  </script>
</body>
</html>
